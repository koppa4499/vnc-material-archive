<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNC Venice Project - Material Research Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier Prime', monospace; background: #fff; color: #000; line-height: 1.4; }
        .container { max-width: 950px; margin: 0 auto; padding: 40px 20px; }
        header { border-bottom: 1px solid #000; padding: 30px 0; margin-bottom: 40px; }
        h1 { font-size: 12px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
        .subtitle { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
        .tabs { display: flex; border-bottom: 1px solid #000; margin-bottom: 40px; }
        .tab-btn { padding: 12px 20px; border: none; background: transparent; cursor: pointer; font-size: 11px; font-weight: 700; border-bottom: 2px solid transparent; font-family: 'Courier Prime', monospace; letter-spacing: 0.1em; text-transform: uppercase; }
        .tab-btn:hover { color: #000; }
        .tab-btn.active { border-bottom-color: #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-section { margin-bottom: 30px; }
        .form-section h2 { font-size: 10px; font-weight: 700; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #000; letter-spacing: 0.15em; text-transform: uppercase; }
        .form-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .form-table th, .form-table td { border: 1px solid #000; padding: 10px 12px; text-align: left; font-size: 10px; }
        .form-table th { background: #fff; font-weight: 700; text-transform: uppercase; width: 25%; }
        label { font-size: 10px; font-weight: 700; display: block; margin-bottom: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
        input[type="text"], textarea, select { padding: 8px 10px; border: 1px solid #000; background: #fff; color: #000; font-size: 10px; font-family: 'Courier Prime', monospace; width: 100%; }
        input[type="text"]:focus, textarea:focus, select:focus { outline: none; border-color: #000; }
        textarea { resize: vertical; min-height: 80px; }
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .checkbox-item { display: flex; align-items: flex-start; gap: 6px; }
        .checkbox-item input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; margin-top: 2px; accent-color: #000; }
        .checkbox-item label { margin: 0; cursor: pointer; font-weight: 400; font-size: 10px; display: inline; text-transform: none; }
        button { padding: 10px 16px; font-size: 10px; border: 1px solid #000; background: #fff; color: #000; cursor: pointer; font-weight: 700; font-family: 'Courier Prime', monospace; letter-spacing: 0.05em; text-transform: uppercase; }
        button.primary { background: #000; color: #fff; }
        button.primary:hover { background: #333; }
        .success-message, .error-message { display: none; padding: 12px 16px; border: 1px solid #000; margin-bottom: 20px; font-size: 10px; }
        .success-message { color: #000; }
        .error-message { color: #cc0000; border-color: #cc0000; }
        .button-group { display: flex; gap: 10px; margin-top: 30px; }
        .search-filters { margin-bottom: 25px; }
        .search-input input { width: 100%; margin-bottom: 15px; }
        .filter-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .materials-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .material-card { background: #fff; border: 1px solid #000; }
        .material-card:hover { box-shadow: 2px 2px 0px #000; }
        .material-content { padding: 12px; }
        .material-card h3 { font-size: 10px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
        .material-meta { font-size: 9px; margin-bottom: 8px; }
        .material-meta strong { font-weight: 700; }
        .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        .badge { display: inline-block; padding: 2px 6px; background: #fff; color: #000; border: 1px solid #000; font-size: 8px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
        .material-notes { font-size: 9px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #000; }
        .empty-state { grid-column: 1/-1; padding: 60px 20px; text-align: center; }
        .empty-state p { font-size: 11px; }
        .loading { text-align: center; padding: 20px; font-size: 11px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>VNC VENICE PROJECT</h1>
            <p class="subtitle">Material Research Unit - Material Documentation & Archive</p>
        </div>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'form'); return false;">Add Material</button>
            <button class="tab-btn" onclick="openTab(event, 'archive'); return false;">View Archive</button>
        </div>

        <!-- FORM TAB -->
        <div id="form" class="tab-content active">
            <div class="success-message" id="successMessage">✓ Material saved successfully!</div>
            <div class="error-message" id="errorMessage"></div>

            <form id="materialForm">
                <div style="margin-bottom: 20px;">
                    <label>Material/System name *</label>
                    <input type="text" id="materialName" required placeholder="e.g., Concrete Panel System" style="margin-bottom: 15px;">
                    <label>Code *</label>
                    <input type="text" id="code" required placeholder="e.g., MAT-001">
                </div>

                <div class="form-section">
                    <h2>General Data</h2>
                    <table class="form-table">
                        <tr>
                            <th>Provider source</th>
                            <td><input type="text" id="provider" placeholder="e.g., Local Supplier"></td>
                        </tr>
                        <tr>
                            <th>Cost</th>
                            <td><input type="text" id="cost" placeholder="e.g., €150/m²"></td>
                        </tr>
                    </table>
                </div>

                <div class="form-section">
                    <h2>System Data</h2>
                    <table class="form-table">
                        <tr>
                            <th>Process (fabrication)</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="FOLD" name="process"><label>Fold</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="EXTRUDE" name="process"><label>Extrude</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="CAST" name="process"><label>Cast</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="CUT" name="process"><label>Cut</label></div>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>System type</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="LINEAR" name="systemType"><label>Linear</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="PANEL" name="systemType"><label>Panel</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="FRAME" name="systemType"><label>Frame</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="MODULAR" name="systemType"><label>Modular</label></div>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>Structural logic</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="SELF-SUPPORTING" name="structuralLogic"><label>Self-supporting</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="SUPPORTED" name="structuralLogic"><label>Supported</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="SUSPENDED" name="structuralLogic"><label>Suspended</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="ATTACHED" name="structuralLogic"><label>Attached</label></div>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>

                <div class="form-section">
                    <h2>Spatial Definition</h2>
                    <table class="form-table">
                        <tr>
                            <th>Spatial role</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="STRUCTURE" name="spatialRole"><label>Structure</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="DIVIDER" name="spatialRole"><label>Divider</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="SURFACE" name="spatialRole"><label>Surface</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="FILTER" name="spatialRole"><label>Filter</label></div>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>Scale</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="OBJECT" name="scale"><label>Object</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="FURNITURE" name="scale"><label>Furniture</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="ROOM" name="scale"><label>Room</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="BUILDING" name="scale"><label>Building</label></div>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>Position</th>
                            <td>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" value="FLOOR" name="position"><label>Floor</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="WALL" name="position"><label>Wall</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="CEILING" name="position"><label>Ceiling</label></div>
                                    <div class="checkbox-item"><input type="checkbox" value="FREESTANDING" name="position"><label>Freestanding</label></div>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>

                <div class="form-section">
                    <h2>Notes</h2>
                    <table class="form-table">
                        <tr>
                            <td style="width: 100%;"><textarea id="notes" placeholder="Add any additional information..."></textarea></td>
                        </tr>
                    </table>
                </div>

                <div class="button-group">
                    <button type="submit" class="primary">Save Material</button>
                    <button type="reset">Clear Form</button>
                </div>
            </form>
        </div>

        <!-- ARCHIVE TAB -->
        <div id="archive" class="tab-content">
            <div class="search-filters">
                <div class="search-input">
                    <input type="text" id="searchInput" placeholder="Search by name or code..." onkeyup="loadArchive()">
                </div>
                <div class="filter-row">
                    <select id="filterProcess" onchange="loadArchive()">
                        <option value="">All processes</option>
                        <option value="FOLD">Fold</option>
                        <option value="EXTRUDE">Extrude</option>
                        <option value="CAST">Cast</option>
                        <option value="CUT">Cut</option>
                    </select>
                    <select id="filterSystemType" onchange="loadArchive()">
                        <option value="">All system types</option>
                        <option value="LINEAR">Linear</option>
                        <option value="PANEL">Panel</option>
                        <option value="FRAME">Frame</option>
                        <option value="MODULAR">Modular</option>
                    </select>
                    <select id="filterScale" onchange="loadArchive()">
                        <option value="">All scales</option>
                        <option value="OBJECT">Object</option>
                        <option value="FURNITURE">Furniture</option>
                        <option value="ROOM">Room</option>
                        <option value="BUILDING">Building</option>
                    </select>
                    <select id="filterSpatialRole" onchange="loadArchive()">
                        <option value="">All spatial roles</option>
                        <option value="STRUCTURE">Structure</option>
                        <option value="DIVIDER">Divider</option>
                        <option value="SURFACE">Surface</option>
                        <option value="FILTER">Filter</option>
                    </select>
                </div>
            </div>
            <div id="materialsGrid" class="materials-grid"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://wlkqoacibkoepxpccjin.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jTzU8HTvBD97YbH0NlWBDQ_VqYJ34pI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function openTab(evt, tabName) {
            evt.preventDefault();
            evt.stopPropagation();
            
            // Hide all tab contents
            var contents = document.getElementsByClassName("tab-content");
            for (var i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
            }
            
            // Remove active class from all buttons
            var buttons = document.getElementsByClassName("tab-btn");
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }
            
            // Show selected tab content
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            
            // Load archive if needed
            if (tabName === 'archive') {
                setTimeout(function() {
                    loadArchive();
                }, 100);
            }
        }

        document.getElementById('materialForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const getCheckedValues = (name) => {
                return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(cb => cb.value).join(', ');
            };

            const material = {
                material_name: document.getElementById('materialName').value,
                code: document.getElementById('code').value,
                provider: document.getElementById('provider').value,
                cost: document.getElementById('cost').value,
                process: getCheckedValues('process'),
                system_type: getCheckedValues('systemType'),
                structural_logic: getCheckedValues('structuralLogic'),
                spatial_role: getCheckedValues('spatialRole'),
                scale: getCheckedValues('scale'),
                position: getCheckedValues('position'),
                notes: document.getElementById('notes').value
            };

            try {
                const { error } = await supabase.from('materials').insert([material]);
                if (error) throw error;
                
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';
                this.reset();
                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                }, 3000);
            } catch (err) {
                document.getElementById('errorMessage').textContent = '✗ Error: ' + err.message;
                document.getElementById('errorMessage').style.display = 'block';
            }
        });

        async function loadArchive() {
            const grid = document.getElementById('materialsGrid');
            grid.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const { data, error } = await supabase.from('materials').select('*').order('id', { ascending: false });
                if (error) throw error;

                let materials = data || [];
                const search = document.getElementById('searchInput').value.toLowerCase();
                const filterProcess = document.getElementById('filterProcess').value;
                const filterSystemType = document.getElementById('filterSystemType').value;
                const filterScale = document.getElementById('filterScale').value;
                const filterSpatialRole = document.getElementById('filterSpatialRole').value;

                materials = materials.filter(m => {
                    const matchSearch = !search || m.material_name.toLowerCase().includes(search) || m.code.toLowerCase().includes(search);
                    const matchProcess = !filterProcess || (m.process && m.process.includes(filterProcess));
                    const matchSystemType = !filterSystemType || (m.system_type && m.system_type.includes(filterSystemType));
                    const matchScale = !filterScale || (m.scale && m.scale.includes(filterScale));
                    const matchSpatialRole = !filterSpatialRole || (m.spatial_role && m.spatial_role.includes(filterSpatialRole));
                    return matchSearch && matchProcess && matchSystemType && matchScale && matchSpatialRole;
                });

                if (materials.length === 0) {
                    grid.innerHTML = '<div class="empty-state"><p>No materials found. Add your first material to get started.</p></div>';
                    return;
                }

                grid.innerHTML = materials.map(m => `
                    <div class="material-card">
                        <div class="material-content">
                            <h3>${m.material_name}</h3>
                            <div class="material-meta"><strong>Code:</strong> ${m.code}</div>
                            ${m.provider ? `<div class="material-meta"><strong>Provider:</strong> ${m.provider}</div>` : ''}
                            ${m.cost ? `<div class="material-meta"><strong>Cost:</strong> ${m.cost}</div>` : ''}
                            <div class="badges">
                                ${m.process ? m.process.split(', ').map(p => `<span class="badge">${p}</span>`).join('') : ''}
                                ${m.system_type ? m.system_type.split(', ').map(s => `<span class="badge">${s}</span>`).join('') : ''}
                                ${m.scale ? m.scale.split(', ').map(s => `<span class="badge">${s}</span>`).join('') : ''}
                            </div>
                            ${m.notes ? `<div class="material-notes">${m.notes}</div>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = '<div class="empty-state"><p>Error: ' + err.message + '</p></div>';
            }
        }
    </script>
</body>
</html>
