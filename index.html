<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNC Venice Project - Material Research Archive</title>
    <meta name="description" content="Online material documentation and archive system for the VNC Venice Architecture Project">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #000000;
            --text-primary: #000000;
            --text-secondary: #333333;
            --border-color: #000000;
            --bg-light: #ffffff;
            --bg-white: #ffffff;
        }

        body {
            font-family: 'Courier Prime', monospace;
            background: #ffffff;
            color: var(--text-primary);
            line-height: 1.4;
            letter-spacing: 0.02em;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            background: #ffffff;
            border-bottom: 1px solid #000000;
            padding: 30px 0;
            margin-bottom: 40px;
        }

        .header-content {
            max-width: 950px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.15em;
            margin-bottom: 4px;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 11px;
            color: var(--text-primary);
            margin-bottom: 0;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #000000;
            margin-bottom: 40px;
            background: #ffffff;
            border-radius: 0;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: var(--text-primary);
            border-bottom-color: var(--text-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-card {
            background: #ffffff;
            border: none;
            border-radius: 0;
            padding: 0;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section:last-child {
            margin-bottom: 0;
        }

        .form-section h2 {
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #000000;
            color: var(--text-primary);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .form-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .form-table th,
        .form-table td {
            border: 1px solid #000000;
            padding: 10px 12px;
            text-align: left;
            font-size: 10px;
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.05em;
        }

        .form-table th {
            background: #ffffff;
            font-weight: 700;
            color: var(--text-primary);
            width: 25%;
            text-transform: uppercase;
        }

        .form-table td {
            font-size: 10px;
            background: #ffffff;
        }

        label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-primary);
            display: block;
            margin-bottom: 4px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        input[type="text"],
        textarea,
        select {
            padding: 8px 10px;
            border: 1px solid #000000;
            border-radius: 0;
            background: #ffffff;
            color: var(--text-primary);
            font-size: 10px;
            font-family: 'Courier Prime', monospace;
            transition: border-color 0.2s;
            width: 100%;
            letter-spacing: 0.02em;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--text-primary);
            box-shadow: none;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Courier Prime', monospace;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: #000000;
            margin-top: 2px;
            flex-shrink: 0;
            border: 1px solid #000000;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background: #ffffff;
        }

        .checkbox-item input[type="checkbox"]:checked {
            background: #000000;
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100% 100%;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
            font-size: 10px;
            display: inline;
            text-transform: none;
        }

        .image-upload-btn {
            padding: 8px 10px;
            background: #ffffff;
            border: 1px solid #000000;
            border-radius: 0;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-primary);
            transition: background-color 0.2s;
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .image-upload-btn:hover {
            background: #f0f0f0;
        }

        #imageInput {
            display: none;
        }

        .image-preview {
            margin-top: 12px;
            max-width: 200px;
            border: 1px solid #000000;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            padding: 10px 16px;
            font-size: 10px;
            border: 1px solid #000000;
            background: #ffffff;
            color: var(--text-primary);
            border-radius: 0;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        button:hover {
            background: #f0f0f0;
        }

        button.primary {
            background: #000000;
            color: #ffffff;
            border-color: #000000;
        }

        button.primary:hover {
            background: #333333;
            border-color: #333333;
        }

        .success-message {
            display: none;
            padding: 12px 16px;
            background: #ffffff;
            color: #000000;
            border: 1px solid #000000;
            border-radius: 0;
            margin-bottom: 20px;
            font-size: 10px;
            font-family: 'Courier Prime', monospace;
        }

        .error-message {
            display: none;
            padding: 12px 16px;
            background: #ffffff;
            color: #cc0000;
            border: 1px solid #cc0000;
            border-radius: 0;
            margin-bottom: 20px;
            font-size: 10px;
            font-family: 'Courier Prime', monospace;
        }

        .search-filters {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
        }

        .search-input input {
            width: 100%;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-row select {
            width: 100%;
        }

        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .material-card {
            background: #ffffff;
            border: 1px solid #000000;
            border-radius: 0;
            overflow: hidden;
            transition: all 0.2s;
        }

        .material-card:hover {
            border-color: #000000;
            box-shadow: 2px 2px 0px #000000;
        }

        .material-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f0f0f0;
            display: block;
            border-bottom: 1px solid #000000;
        }

        .material-content {
            padding: 12px;
        }

        .material-card h3 {
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .material-meta {
            font-size: 9px;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        .material-meta strong {
            color: var(--text-primary);
            font-weight: 700;
        }

        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            background: #ffffff;
            color: #000000;
            border: 1px solid #000000;
            border-radius: 0;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .material-notes {
            font-size: 9px;
            color: var(--text-primary);
            line-height: 1.4;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #000000;
        }

        .empty-state {
            grid-column: 1 / -1;
            padding: 60px 20px;
            text-align: center;
            color: var(--text-primary);
        }

        .empty-state p {
            font-size: 11px;
            letter-spacing: 0.05em;
        }

        .loading {
            text-align: center;
            padding: 20px;
            font-size: 11px;
        }

        @media (max-width: 768px) {
            .filter-row {
                grid-template-columns: 1fr;
            }

            .materials-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 11px;
            }

            .form-card {
                padding: 20px;
            }

            .checkbox-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>VNC VENICE PROJECT</h1>
            <p class="subtitle">Material Research Unit - Material Documentation & Archive</p>
        </div>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="form">Add Material</button>
            <button class="tab-btn" data-tab="archive">View Archive</button>
        </div>

        <!-- FORM TAB -->
        <div id="form" class="tab-content active">
            <div class="form-card">
                <div class="success-message" id="successMessage">✓ Material saved successfully!</div>
                <div class="error-message" id="errorMessage"></div>

                <form id="materialForm">
                    <!-- MATERIAL/SYSTEM NAME & CODE -->
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 6px;">Material/System name *</label>
                        <input type="text" id="materialName" required placeholder="e.g., Concrete Panel System" style="width: 100%; margin-bottom: 15px;">
                        
                        <label style="display: block; margin-bottom: 6px;">Code *</label>
                        <input type="text" id="code" required placeholder="e.g., MAT-001" style="width: 100%;">
                    </div>

                    <!-- GENERAL DATA TABLE -->
                    <div class="form-section">
                        <h2>General Data</h2>
                        <table class="form-table">
                            <tr>
                                <th>Provider source</th>
                                <td><input type="text" id="provider" placeholder="e.g., Local Supplier"></td>
                            </tr>
                            <tr>
                                <th>Cost</th>
                                <td><input type="text" id="cost" placeholder="e.g., €150/m²"></td>
                            </tr>
                        </table>
                    </div>

                    <!-- SYSTEM DATA TABLE -->
                    <div class="form-section">
                        <h2>System Data</h2>
                        <table class="form-table">
                            <tr>
                                <th>Process (fabrication)</th>
                                <td>
                                    <div class="checkbox-grid">
                                        <div class="checkbox-item"><input type="checkbox" id="p_fold" value="FOLD" name="process"><label for="p_fold">Fold</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="p_extrude" value="EXTRUDE" name="process"><label for="p_extrude">Extrude</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="p_cast" value="CAST" name="process"><label for="p_cast">Cast</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="p_cut" value="CUT" name="process"><label for="p_cut">Cut</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="p_press" value="PRESS" name="process"><label for="p_press">Press</label></div>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <th>System type</th>
                                <td>
                                    <div class="checkbox-grid">
                                        <div class="checkbox-item"><input type="checkbox" id="s_linear" value="LINEAR" name="systemType"><label for="s_linear">Linear</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="s_panel" value="PANEL" name="systemType"><label for="s_panel">Panel</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="s_frame" value="FRAME" name="systemType"><label for="s_frame">Frame</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="s_modular" value="MODULAR" name="systemType"><label for="s_modular">Modular</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="s_surface" value="SURFACE" name="systemType"><label for="s_surface">Surface</label></div>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <th>Structural logic</th>
                                <td>
                                    <div class="checkbox-grid">
                                        <div class="checkbox-item"><input type="checkbox" id="sl_self" value="SELF-SUPPORTING" name="structuralLogic"><label for="sl_self">Self-supporting</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="sl_supported" value="SUPPORTED" name="structuralLogic"><label for="sl_supported">Supported</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="sl_suspended" value="SUSPENDED" name="structuralLogic"><label for="sl_suspended">Suspended</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="sl_attached" value="ATTACHED" name="structuralLogic"><label for="sl_attached">Attached</label></div>
                                    </div>
                                </td>
                            </tr>
                        </table>
                    </div>

                    <!-- SPATIAL DEFINITION TABLE -->
                    <div class="form-section">
                        <h2>Spatial Definition</h2>
                        <table class="form-table">
                            <tr>
                                <th>Spatial role</th>
                                <td>
                                    <div class="checkbox-grid">
                                        <div class="checkbox-item"><input type="checkbox" id="sp_structure" value="STRUCTURE" name="spatialRole"><label for="sp_structure">Structure</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="sp_divider" value="DIVIDER" name="spatialRole"><label for="sp_divider">Divider</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="sp_surface" value="SURFACE" name="spatialRole"><label for="sp_surface">Surface</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="sp_filter" value="FILTER" name="spatialRole"><label for="sp_filter">Filter</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="sp_display" value="DISPLAY" name="spatialRole"><label for="sp_display">Display</label></div>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <th>Scale</th>
                                <td>
                                    <div class="checkbox-grid">
                                        <div class="checkbox-item"><input type="checkbox" id="sc_object" value="OBJECT" name="scale"><label for="sc_object">Object</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="sc_furniture" value="FURNITURE" name="scale"><label for="sc_furniture">Furniture</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="sc_room" value="ROOM" name="scale"><label for="sc_room">Room</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="sc_building" value="BUILDING" name="scale"><label for="sc_building">Building</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="sc_landscape" value="LANDSCAPE" name="scale"><label for="sc_landscape">Landscape</label></div>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <th>Position</th>
                                <td>
                                    <div class="checkbox-grid">
                                        <div class="checkbox-item"><input type="checkbox" id="pos_floor" value="FLOOR" name="position"><label for="pos_floor">Floor</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="pos_wall" value="WALL" name="position"><label for="pos_wall">Wall</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="pos_ceiling" value="CEILING" name="position"><label for="pos_ceiling">Ceiling</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="pos_freestanding" value="FREESTANDING" name="position"><label for="pos_freestanding">Freestanding</label></div>
                                        <div class="checkbox-item"><input type="checkbox" id="pos_exterior" value="EXTERIOR" name="position"><label for="pos_exterior">Exterior</label></div>
                                    </div>
                                </td>
                            </tr>
                        </table>
                    </div>

                    <!-- NOTES TABLE -->
                    <div class="form-section">
                        <h2>Notes</h2>
                        <table class="form-table">
                            <tr>
                                <td style="width: 100%;"><textarea id="notes" placeholder="Add any additional information about this material..."></textarea></td>
                            </tr>
                        </table>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="primary">Save Material</button>
                        <button type="reset">Clear Form</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ARCHIVE TAB -->
        <div id="archive" class="tab-content">
            <div class="search-filters">
                <div class="search-input">
                    <input type="text" id="searchInput" placeholder="Search by name or code...">
                </div>
                <div class="filter-row">
                    <select id="filterProcess">
                        <option value="">All processes</option>
                        <option value="FOLD">Fold</option>
                        <option value="EXTRUDE">Extrude</option>
                        <option value="CAST">Cast</option>
                        <option value="CUT">Cut</option>
                        <option value="PRESS">Press</option>
                    </select>
                    <select id="filterSystemType">
                        <option value="">All system types</option>
                        <option value="LINEAR">Linear</option>
                        <option value="PANEL">Panel</option>
                        <option value="FRAME">Frame</option>
                        <option value="MODULAR">Modular</option>
                        <option value="SURFACE">Surface</option>
                    </select>
                    <select id="filterScale">
                        <option value="">All scales</option>
                        <option value="OBJECT">Object</option>
                        <option value="FURNITURE">Furniture</option>
                        <option value="ROOM">Room</option>
                        <option value="BUILDING">Building</option>
                        <option value="LANDSCAPE">Landscape</option>
                    </select>
                    <select id="filterSpatialRole">
                        <option value="">All spatial roles</option>
                        <option value="STRUCTURE">Structure</option>
                        <option value="DIVIDER">Divider</option>
                        <option value="SURFACE">Surface</option>
                        <option value="FILTER">Filter</option>
                        <option value="DISPLAY">Display</option>
                    </select>
                </div>
            </div>

            <div id="materialsGrid" class="materials-grid"></div>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://wlkqoacibkoepxpccjin.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_jTzU8HTvBD97YbH0NlWBDQ_VqYJ34pI';

        let supabase = null;
        
        // Wait for Supabase to load
        setTimeout(() => {
            if (window.supabase) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase initialized successfully');
            } else {
                console.error('Supabase library failed to load');
            }
        }, 500);

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(tabName).classList.add('active');
                if (tabName === 'archive') loadArchive();
            });
        });

        // Form submission
        document.getElementById('materialForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!supabase) {
                const errorMsg = document.getElementById('errorMessage');
                errorMsg.textContent = '✗ Database is still loading. Please wait a moment and try again.';
                errorMsg.style.display = 'block';
                return;
            }

            const getCheckedValues = (name) => {
                return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(cb => cb.value);
            };

            const material = {
                material_name: document.getElementById('materialName').value,
                code: document.getElementById('code').value,
                provider: document.getElementById('provider').value,
                cost: document.getElementById('cost').value,
                process: getCheckedValues('process').join(', '),
                system_type: getCheckedValues('systemType').join(', '),
                structural_logic: getCheckedValues('structuralLogic').join(', '),
                spatial_role: getCheckedValues('spatialRole').join(', '),
                scale: getCheckedValues('scale').join(', '),
                position: getCheckedValues('position').join(', '),
                notes: document.getElementById('notes').value
            };

            try {
                const { data, error } = await supabase
                    .from('materials')
                    .insert([material]);

                if (error) throw error;

                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';
                this.reset();
                
                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                }, 3000);
            } catch (error) {
                console.error('Error:', error);
                const errorMsg = document.getElementById('errorMessage');
                errorMsg.textContent = '✗ Error saving material: ' + error.message;
                errorMsg.style.display = 'block';
            }
        });

        async function loadArchive() {
            const grid = document.getElementById('materialsGrid');
            grid.innerHTML = '<div class="loading">Loading materials...</div>';
            
            if (!supabase) {
                grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>Database is loading... Please wait a moment and try again.</p></div>';
                return;
            }
            
            try {
                const { data, error } = await supabase
                    .from('materials')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;

                let materials = data || [];
                materials = materials.filter(item => item.material_name && item.material_name.trim() !== '');
                
                const search = document.getElementById('searchInput').value.toLowerCase();
                const filterProcess = document.getElementById('filterProcess').value;
                const filterSystemType = document.getElementById('filterSystemType').value;
                const filterScale = document.getElementById('filterScale').value;
                const filterSpatialRole = document.getElementById('filterSpatialRole').value;

                materials = materials.filter(m => {
                    const matchSearch = !search || (m.material_name && m.material_name.toLowerCase().includes(search)) || (m.code && m.code.toLowerCase().includes(search));
                    const matchProcess = !filterProcess || (m.process && m.process.includes(filterProcess));
                    const matchSystemType = !filterSystemType || (m.system_type && m.system_type.includes(filterSystemType));
                    const matchScale = !filterScale || (m.scale && m.scale.includes(filterScale));
                    const matchSpatialRole = !filterSpatialRole || (m.spatial_role && m.spatial_role.includes(filterSpatialRole));
                    return matchSearch && matchProcess && matchSystemType && matchScale && matchSpatialRole;
                });

                if (materials.length === 0) {
                    grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>No materials found. Add your first material to get started.</p></div>';
                    return;
                }

                grid.innerHTML = materials.map(m => `
                    <div class="material-card">
                        <div class="material-content">
                            <h3>${m.material_name || ''}</h3>
                            <div class="material-meta"><strong>Code:</strong> ${m.code || ''}</div>
                            ${m.provider ? `<div class="material-meta"><strong>Provider:</strong> ${m.provider}</div>` : ''}
                            ${m.cost ? `<div class="material-meta"><strong>Cost:</strong> ${m.cost}</div>` : ''}
                            <div class="badges">
                                ${m.process ? m.process.split(', ').map(p => `<span class="badge">${p}</span>`).join('') : ''}
                                ${m.system_type ? m.system_type.split(', ').map(s => `<span class="badge">${s}</span>`).join('') : ''}
                                ${m.scale ? m.scale.split(', ').map(sc => `<span class="badge">${sc}</span>`).join('') : ''}
                            </div>
                            ${m.notes ? `<div class="material-notes">${m.notes}</div>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading archive:', error);
                grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>Error loading materials: ' + error.message + '</p></div>';
            }
        }

        // Filter event listeners
        document.getElementById('searchInput').addEventListener('input', loadArchive);
        document.getElementById('filterProcess').addEventListener('change', loadArchive);
        document.getElementById('filterSystemType').addEventListener('change', loadArchive);
        document.getElementById('filterScale').addEventListener('change', loadArchive);
        document.getElementById('filterSpatialRole').addEventListener('change', loadArchive);
    </script>
</body>
</html>
